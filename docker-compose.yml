version: "3.9"

services:
  # ─── Blockchain locale ─────────────────────────────────
  hardhat:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    command: npx hardhat node --hostname 0.0.0.0
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend API ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./deployed-addresses.json:/app/backend/deployed-addresses.json:ro
      - backend_data:/app/backend/data
    environment:
      - PORT=3001
      - RPC_URL=http://hardhat:8545
      - PRIVATE_KEY=${PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - JWT_SECRET=${JWT_SECRET:-safeland-docker-dev-only}
      - JWT_EXPIRES=7d
      - DB_PATH=/app/backend/data/safeland.db
      - FRONTEND_URL=http://localhost:3000
      - PINATA_API_KEY=${PINATA_API_KEY:-}
      - PINATA_API_SECRET=${PINATA_API_SECRET:-}
      - NFT_ADDRESS=${NFT_ADDRESS:-}
      - ESCROW_ADDRESS=${ESCROW_ADDRESS:-}
      - FRIDDA_ADDRESS=${FRIDDA_ADDRESS:-}
      - JUSTICE_ADDRESS=${JUSTICE_ADDRESS:-}
      - REGISTRY_ADDRESS=${REGISTRY_ADDRESS:-}
      - TIMELOCK_ADDRESS=${TIMELOCK_ADDRESS:-}
    depends_on:
      deployer:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── Frontend Next.js ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_CHAIN_ID=31337
      - NEXT_PUBLIC_NFT_ADDRESS=${NFT_ADDRESS:-}
      - NEXT_PUBLIC_REGISTRY_ADDRESS=${REGISTRY_ADDRESS:-}
      - NEXT_PUBLIC_ESCROW_ADDRESS=${ESCROW_ADDRESS:-}
      - NEXT_PUBLIC_FRIDDA_ADDRESS=${FRIDDA_ADDRESS:-}
      - NEXT_PUBLIC_JUSTICE_ADDRESS=${JUSTICE_ADDRESS:-}
      - NEXT_PUBLIC_TIMELOCK_ADDRESS=${TIMELOCK_ADDRESS:-}
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Déploiement contrats ──────────────────────────────
  deployer:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    command: sh -c "sleep 5 && npx hardhat run scripts/deploy.js --network localhost"
    environment:
      - HARDHAT_NETWORK=localhost
    depends_on:
      hardhat:
        condition: service_healthy

volumes:
  root_node_modules:
  backend_data:
