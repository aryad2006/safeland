name: SafeLand CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint + Compile Solidity ───────────────────────────
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

      - name: Gas report
        run: REPORT_GAS=true npx hardhat test
        env:
          REPORT_GAS: true

  # ─── Backend Lint + Test ───────────────────────────────
  backend:
    name: Backend API
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Run backend Jest tests
        run: cd backend && npx jest --forceExit --coverage --coverageReporters=text-summary
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-32chars-minimum-ok
          BLOCKCHAIN_RPC_URL: http://localhost:8545
          CONTRACT_ADDRESS_NFT: "0x0000000000000000000000000000000000000001"
          CONTRACT_ADDRESS_REGISTRY: "0x0000000000000000000000000000000000000002"
          CONTRACT_ADDRESS_ESCROW: "0x0000000000000000000000000000000000000003"
          CONTRACT_ADDRESS_FRIDDA: "0x0000000000000000000000000000000000000004"
          CONTRACT_ADDRESS_JUSTICE: "0x0000000000000000000000000000000000000005"
          CONTRACT_ADDRESS_TIMELOCK: "0x0000000000000000000000000000000000000006"

  # ─── Frontend Build ───────────────────────────────────
  frontend:
    name: Frontend Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  # ─── Subgraph Codegen ─────────────────────────────────
  subgraph:
    name: Subgraph Codegen + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: subgraph/package-lock.json

      - name: Install subgraph dependencies
        run: cd subgraph && npm ci

      - name: Graph codegen
        run: cd subgraph && npx graph codegen

      - name: Graph build
        run: cd subgraph && npx graph build

  # ─── Security Audit ───────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Audit root
        run: npm audit --audit-level=high || true

      - name: Audit backend
        run: cd backend && npm audit --audit-level=high || true

      - name: Audit frontend
        run: cd frontend && npm audit --audit-level=high || true

  # ─── Slither Static Analysis ──────────────────────────
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: high
          slither-args: --filter-paths "node_modules|@openzeppelin"

  # ─── Coverage Report ─────────────────────────────────
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npx hardhat coverage

      - name: Check coverage thresholds
        run: |
          echo "Coverage report generated in coverage/"
          cat coverage/coverage-summary.json 2>/dev/null || true

  # ─── E2E Playwright (main branch only) ───────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_CHAIN_ID: "31337"

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_CHAIN_ID: "31337"

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
